
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>就活管理ツール</title>

    <style>

        body{
            font-family: sans-serif;
            background-color: #f5f5f5;
            margin: 30px;
        }

        h1{
            text-align: center;
        }

        .container{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, select, button{
            padding: 8px;
            margin: 5px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: #e0e0e0;
        }

        .failed{
            background-color: #ffd6d6;
        }

    </style>

</head>

<body>

    <h1>就活管理ダッシュボード</h1>

	<div style="text-align:center; margin-bottom:20px;">

    <button onclick="showActiveCompanies()">
        進行中一覧
    </button>

    <button onclick="showFailedCompanies()">
        不採用一覧
    </button>

</div>

    <!-- 入力フォーム -->
    <div class="container" id="activeContainer">

        <h2>企業追加</h2>

        <input type="text" id="companyName" placeholder="会社名">

        <select id="status">
            <option>気になる</option>
            <option>応募済み</option>
            <option>ES提出</option>
            <option>1次面接</option>
            <option>2次面接</option>
            <option>最終面接</option>
            <option>内定</option>
            <option>不合格</option>
        </select>

        <input type="date" id="interviewDate">

        <input type="text" id="memo" placeholder="メモ">

        <button onclick="addCompany()">追加</button>

    </div>

<div class="container" id="activeContainer">

    <h2>進行中一覧</h2>

    <table>

        <thead>
            <tr>
                <th>会社名</th>
                <th>状況</th>
                <th>次回面接</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody id="companyTable">

        </tbody>

    </table>

</div>



<!-- 不採用一覧 -->
<div class="container" id="failedContainer">

    <h2>不採用一覧</h2>

    <table>

        <thead>
            <tr>
                <th>会社名</th>
                <th>状況</th>
                <th>次回面接</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody id="failedTable">

        </tbody>

    </table>

</div>

    

    <script>

         // ページ読み込み時
    window.onload = function(){

        loadCompanies();

	showActiveCompanies();

    }


    // 企業追加
    function addCompany(){

        const companyName =
            document.getElementById("companyName").value;

        const status =
            document.getElementById("status").value;

        const interviewDate =
            document.getElementById("interviewDate").value;

        const memo =
            document.getElementById("memo").value;


        // 会社データ作成
        const company = {

            companyName: companyName,
            status: status,
            interviewDate: interviewDate,
            memo: memo

        };


        // localStorage取得
        let companies =
            JSON.parse(localStorage.getItem("companies")) || [];


        // 配列追加
        companies.push(company);


        // 保存
        localStorage.setItem(
            "companies",
            JSON.stringify(companies)
        );


        // 表更新
        displayCompanies();


        // 入力リセット
        document.getElementById("companyName").value = "";
        document.getElementById("interviewDate").value = "";
        document.getElementById("memo").value = "";

    }



    // 表示処理
    function displayCompanies(){

        const table =
            document.getElementById("companyTable");

	 const failedTable =
        document.getElementById("failedTable");

        // 一旦空にする
        table.innerHTML = "";

	failedTable.innerHTML = "";


        // localStorage取得
        let companies =
            JSON.parse(localStorage.getItem("companies")) || [];


        // ループ
       companies.forEach(function(company, index){

            const row =
                document.createElement("tr");

            // 不合格なら色変更
            if(company.status === "不合格"){

                row.classList.add("failed");

            }


            row.innerHTML = `

              <td>${company.companyName}</td>

    <td>
        <select onchange="changeStatus(${index}, this.value)">

            <option value="気になる"
                ${company.status === "気になる" ? "selected" : ""}>
                気になる
            </option>

            <option value="応募済み"
                ${company.status === "応募済み" ? "selected" : ""}>
                応募済み
            </option>

            <option value="ES提出"
                ${company.status === "ES提出" ? "selected" : ""}>
                ES提出
            </option>

            <option value="1次面接"
                ${company.status === "1次面接" ? "selected" : ""}>
                1次面接
            </option>

            <option value="2次面接"
                ${company.status === "2次面接" ? "selected" : ""}>
                2次面接
            </option>

            <option value="最終面接"
                ${company.status === "最終面接" ? "selected" : ""}>
                最終面接
            </option>

            <option value="内定"
                ${company.status === "内定" ? "selected" : ""}>
                内定
            </option>

            <option value="不合格"
                ${company.status === "不合格" ? "selected" : ""}>
                不合格
            </option>

        </select>
    </td>

    <td>

    <input
        type="date"
        value="${company.interviewDate}"
        onchange="changeInterviewDate(${index}, this.value)"
    >

</td>

    <td>

    <input
        type="text"
        value="${company.memo}"
        onchange="changeMemo(${index}, this.value)"
    >

</td>

    <td>
        <button onclick="deleteCompany(${index})">
            削除
        </button>
    </td>

`;

          if(company.status === "不合格"){

    failedTable.appendChild(row);

}else{

    table.appendChild(row);

}

        });

    }



    // 初回読み込み
    function loadCompanies(){

        displayCompanies();

    }

// 削除
function deleteCompany(index){

    let companies =
        JSON.parse(localStorage.getItem("companies")) || [];

    companies.splice(index, 1);

    localStorage.setItem(
        "companies",
        JSON.stringify(companies)
    );

    displayCompanies();

}



// 状況変更
function changeStatus(index, newStatus){

    let companies =
        JSON.parse(localStorage.getItem("companies")) || [];

    companies[index].status = newStatus;

    localStorage.setItem(
        "companies",
        JSON.stringify(companies)
    );

    displayCompanies();

}

// 面接日変更
function changeInterviewDate(index, newDate){

    let companies =
        JSON.parse(localStorage.getItem("companies")) || [];

    companies[index].interviewDate = newDate;

    localStorage.setItem(
        "companies",
        JSON.stringify(companies)
    );

    displayCompanies();
}

function changeMemo(index, newMemo){

    let companies =
        JSON.parse(localStorage.getItem("companies")) || [];

    companies[index].memo = newMemo;

    localStorage.setItem(
        "companies",
        JSON.stringify(companies)
    );

    displayCompanies();

}

function showActiveCompanies(){

    document.getElementById("activeContainer").style.display =
        "block";

    document.getElementById("failedContainer").style.display =
        "none";

}



// 不採用表示
function showFailedCompanies(){

    document.getElementById("activeContainer").style.display =
        "none";

    document.getElementById("failedContainer").style.display =
        "block";

}

</script>
