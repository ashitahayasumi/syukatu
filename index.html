
<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">


    <title>就活管理ツール</title>  
<meta name="viewport" content="width=device-width, initial-scale=1.0">	

    <style>

        body{
            font-family: sans-serif;
            background-color: #f5f5f5;
            margin: 30px;
        }

        h1{
            text-align: center;
        }



        .container{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, select, button{
            padding: 8px;
            margin: 5px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th{
            background-color: #e0e0e0;
        }

        .failed{
            background-color: #ffd6d6;
        }

#dashboard{
    display: none;
}

@media screen and (max-width: 768px){

    body{
        margin: 10px;
    }

    h1{
        font-size: 24px;
    }

    .container{
        padding: 10px;
    }

    input,
    select,
    button{
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
    }

    table{
        font-size: 12px;
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }

    th, td{
        padding: 6px;
    }

}


    </style>

</head>

<body>

<button onclick="login()">
Googleログイン
</button>

<button onclick="logout()">
ログアウト
</button>

<p id="userInfo">
ログインしていません
</p>

<div id="dashboard">

    <h1>就活管理ダッシュボード</h1>

	<div style="text-align:center; margin-bottom:20px;">

    <button onclick="showActiveCompanies()">
        進行中一覧
    </button>

    <button onclick="showFailedCompanies()">
        不採用一覧
    </button>



</div>

    <!-- 入力フォーム -->
    <div class="container" id="inputContainer">

        <h2>企業追加</h2>

        <input type="text" id="companyName" placeholder="会社名">

        <select id="status">
            <option>気になる</option>
            <option>応募済み</option>
            <option>ES提出</option>
            <option>1次面接</option>
            <option>2次面接</option>
            <option>最終面接</option>
            <option>内定</option>
            <option>不合格</option>
        </select>

	<input type="date" id="interviewDate">

        <input type="time" id="interviewTime">

        <input type="text" id="memo" placeholder="メモ">

        <button onclick="addCompany()">追加</button>

    </div>

<div class="container" id="activeContainer">

    <h2>進行中一覧</h2>

    <table>

        <thead>
            <tr>
                <th>会社名</th>
                <th>状況</th>
                <th>次回面接</th>
		<th>時間</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody id="companyTable">

        </tbody>

    </table>

</div>



<!-- 不採用一覧 -->
<div class="container" id="failedContainer">

    <h2>不採用一覧</h2>

    <table>

        <thead>
            <tr>
                <th>会社名</th>
                <th>状況</th>
                <th>次回面接</th>
                <th>メモ</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody id="failedTable">

        </tbody>

    </table>

</div>

    

    <script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  deleteDoc,
  doc,
  updateDoc 	

} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged,
  signOut
} from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkGJgF_6CSlCs74vIJxakA3fPGJ0QUmn4",
  authDomain: "job-dashboard-d8497.firebaseapp.com",
  projectId: "job-dashboard-d8497",
  storageBucket: "job-dashboard-d8497.firebasestorage.app",
  messagingSenderId: "865225879869",
  appId: "1:865225879869:web:42430a22fafb7fc5ac5554"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

         // ページ読み込み時
    window.onload = function(){

	showActiveCompanies();

    }


    // 企業追加
async function addCompany(){

    const companyName =
        document.getElementById("companyName").value;

    const status =
        document.getElementById("status").value;

    const interviewDate =
        document.getElementById("interviewDate").value;

    const interviewTime =
        document.getElementById("interviewTime").value;

    const memo =
        document.getElementById("memo").value;

    await addDoc(collection(db, "companies"), {

        uid: auth.currentUser.uid,

    companyName: companyName,
    status: status,
    interviewDate: interviewDate,
    interviewTime: interviewTime,
    memo: memo

    });

    alert("Firebase保存成功");

    displayCompanies();

    // リセット
    document.getElementById("companyName").value = "";
    document.getElementById("interviewDate").value = "";
    document.getElementById("interviewTime").value = "";
    document.getElementById("memo").value = "";

}   

    // 表示
async function displayCompanies(){

if(!auth.currentUser){
    return;
}

    const table =
        document.getElementById("companyTable");

    table.innerHTML = "";

    const q = query(
    collection(db, "companies"),
    where("uid", "==", auth.currentUser.uid)
);

const querySnapshot = await getDocs(q);

    querySnapshot.forEach((doc) => {

        const company = doc.data();

        const row =
            document.createElement("tr");

 row.innerHTML = `
<td>
<input
value="${company.companyName}"
onchange="confirmUpdate('${doc.id}', 'companyName', this.value)"
>
</td>

<td>
<select onchange="confirmUpdate('${doc.id}', 'status', this.value)">

<option value="気になる" ${company.status === "気になる" ? "selected" : ""}>気になる</option>

<option value="応募済み" ${company.status === "応募済み" ? "selected" : ""}>応募済み</option>

<option value="ES提出" ${company.status === "ES提出" ? "selected" : ""}>ES提出</option>

<option value="1次面接" ${company.status === "1次面接" ? "selected" : ""}>1次面接</option>

<option value="2次面接" ${company.status === "2次面接" ? "selected" : ""}>2次面接</option>

<option value="最終面接" ${company.status === "最終面接" ? "selected" : ""}>最終面接</option>

<option value="内定" ${company.status === "内定" ? "selected" : ""}>内定</option>

<option value="不合格" ${company.status === "不合格" ? "selected" : ""}>不合格</option>

</select>
</td>

<td>
<input
type="date"
value="${company.interviewDate}"
onchange="confirmUpdate('${doc.id}', 'interviewDate', this.value)"
>
</td>

<td>
<input
type="time"
value="${company.interviewTime}"
onchange="confirmUpdate('${doc.id}', 'interviewTime', this.value)"
>
</td>

<td>
<input
value="${company.memo}"
onchange="confirmUpdate('${doc.id}', 'memo', this.value)"
>
</td>

<td>
<button onclick="deleteCompany('${doc.id}')">
削除
</button>
</td>
`;
        table.appendChild(row);

    });

}

function showActiveCompanies(){

    document.getElementById("inputContainer").style.display =
        "block";

    document.getElementById("activeContainer").style.display =
        "block";

    document.getElementById("failedContainer").style.display =
        "none";

}

function showFailedCompanies(){

    document.getElementById("inputContainer").style.display =
        "none";

    document.getElementById("activeContainer").style.display =
        "none";

    document.getElementById("failedContainer").style.display =
        "block";

}

async function deleteCompany(id){

    const result =
        confirm("本当に削除しますか？");

    if(!result){
        return;
    }

    await deleteDoc(doc(db, "companies", id));

    alert("削除しました");

    displayCompanies();

}

async function confirmUpdate(id, field, value){

    const result =
        confirm("変更を保存しますか？");

    if(!result){
        return;
    }

    await updateCompany(id, field, value);

    alert("更新しました");

}

async function updateCompany(id, field, value){

    await updateDoc(doc(db, "companies", id), {

        [field]: value

    });

}

async function login(){

    try{

        const result =
            await signInWithPopup(auth, provider);

        const user = result.user;

        document.getElementById("userInfo").innerText =
            user.displayName;

    }catch(error){

        console.log(error);
	alert(error.message);

    }

}

async function logout(){

    await signOut(auth);

    document.getElementById("userInfo").innerText =
        "ログインしていません";

}

onAuthStateChanged(auth, (user) => {

    if(user){

        document.getElementById("userInfo").innerText =
            "ログイン中: " + user.displayName;

        document.getElementById("dashboard").style.display =
            "block";

        displayCompanies();

    }else{

        document.getElementById("dashboard").style.display =
            "none";

        document.getElementById("userInfo").innerText =
            "ログインしていません";

    }

});


window.addCompany = addCompany;
window.displayCompanies = displayCompanies;
window.showActiveCompanies = showActiveCompanies;
window.showFailedCompanies = showFailedCompanies;
window.login = login;
window.logout = logout;
window.deleteCompany = deleteCompany;
window.updateCompany = updateCompany;
window.confirmUpdate = confirmUpdate;

 </script>

</div>

</body>
</html>
